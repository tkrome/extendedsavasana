# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── HTTP ─────────────────────────────────────────────────────────────────────
# Serves ACME challenges; redirects everything else to HTTPS.

server {
    listen 80;
    server_name extendedsavasana.com www.extendedsavasana.com;
    server_tokens off;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://extendedsavasana.com$request_uri;
    }
}

# ── HTTPS (www → non-www redirect) ───────────────────────────────────────────

server {
    listen 443 ssl;
    server_name www.extendedsavasana.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/extendedsavasana.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/extendedsavasana.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS must be set on every HTTPS response, including redirects
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    return 301 https://extendedsavasana.com$request_uri;
}

# ── HTTPS (canonical) ────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name extendedsavasana.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/extendedsavasana.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/extendedsavasana.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    # X-XSS-Protection omitted: deprecated in modern browsers, can cause issues in IE
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Max upload size
    client_max_body_size 16k;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript text/javascript;

    # Static assets — long cache
    location /_next/static/ {
        limit_conn perip 20;
        proxy_pass http://app:3000;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints — stricter rate limit
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_conn perip 10;
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # Everything else
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_conn perip 20;
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
